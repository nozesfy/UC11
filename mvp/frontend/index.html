<!doctype html>
<!-- Define que este documento é HTML5 -->
<html lang="pt-BR">
  <!-- Define o idioma como português brasileiro -->
  <head>
    <!-- Meta tag para codificação de caracteres UTF-8 -->
    <meta charset="UTF-8" />
    <!-- Link para o favicon (ícone da aba do navegador) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Configura a viewport para responsividade em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título que aparece na aba do navegador -->
    <title>MVP Atacadão - Gestão de Perdas</title>
    <!-- Pré-conexão com servidores de fonte para carregamento mais rápido -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Carrega a fonte Inter e Material Symbols do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Div raiz onde o React renderiza toda a aplicação -->
    <div id="root"></div>
    <!-- Script principal que carrega o arquivo de entrada do React -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
